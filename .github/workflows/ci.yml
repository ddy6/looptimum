name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run test suite
        run: python -m pytest -q templates client_harness_template/tests

      - name: Syntax check critical scripts
        run: |
          python -m py_compile \
            client_harness_template/run_one_eval.py \
            meshing_example/run_optuna_meshing.py \
            templates/bo_client/run_bo.py \
            templates/bo_client_demo/run_bo.py \
            templates/bo_client_full/run_bo.py
